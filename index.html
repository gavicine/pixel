<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pixel Path</title>

    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="diagnostics.css">
    
    <script type="text/javascript">
        function onRuntimeDataReady() {
            document.title = runtimeData.productName;
            
            // rotationLock.js პირდაპირ root-შია
            let rotationLockScript = document.createElement("script");
            rotationLockScript.src = "rotationLock.js";
            document.head.appendChild(rotationLockScript);

            if (runtimeData.debugMode == true) {
                let erudaScript = document.createElement("script");
                erudaScript.src = "eruda.js";
                erudaScript.onload = () => eruda.init();
                document.head.appendChild(erudaScript);
            }
        }
    </script>
    <script type="text/javascript" src="runtimeData.js" onload="onRuntimeDataReady()"></script>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        window.addEventListener("load", () => {
            // სურათებიც პირდაპირ root-შია
            document.body.style.backgroundImage = "url('" + runtimeData.backgroundTextureName + "')";
            
            // ყველა სკრიპტი პირდაპირ root-შია
            const scripts = ["diagnostics.js", "application.js", "aspectRatio.js", "commonFixes.js"];
            scripts.forEach(src => {
                let s = document.createElement("script");
                s.src = src;
                document.body.appendChild(s);
            });

            // მთავარი wrapper-ის ჩატვირთვა
            let loader = document.createElement("script");
            loader.src = runtimeData.wrapperScript + "?r=" + Math.random();
            loader.onload = () => {
                if (typeof initializeWrapper === 'function') initializeWrapper();
                else application.initialize();
            };
            document.body.appendChild(loader);
        });
    </script>
</body>
</html>
